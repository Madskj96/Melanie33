name: Publish birthday site

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/pages.yml"
      - "Melanie33-v2-melanie-final.zip"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract supplied website ZIP
        shell: bash
        run: |
          set -euo pipefail
          test -f Melanie33-v2-melanie-final.zip
          rm -rf _site
          mkdir _site
          unzip -q Melanie33-v2-melanie-final.zip -d _site
          test -f _site/index.html
          test -f _site/styles.css
          test -f _site/app.js
          touch _site/.nojekyll

      - name: Verify exact source photographs
        shell: bash
        run: |
          set -euo pipefail
          cd _site
          echo "2f3bc3c4d81d955616e662110294ee65b19c9ff5369a5e3b3b102983c552c590  assets/mirror-home.png" > /tmp/images.sha256
          echo "169bb7bb50ca489d029f02f2601b29802aaafd337acdf3e8943e49e52ff19e51  assets/mirror-away.png" >> /tmp/images.sha256
          echo "169d2f6aa4376bf02eef1f61ee702d0860ef901e1b21fa0dc197badb1ad2b86a  assets/kit-home.png" >> /tmp/images.sha256
          echo "38b089087330b828fd0f8386cc9ca849b5ca2d9aefc233e51e6c1c2c24cf1051  assets/kit-away.png" >> /tmp/images.sha256
          echo "2529615bddc7f202e0fd09544cc99d690b95d595101fa05e333f31c7c1784284  assets/champions-badge.jpg" >> /tmp/images.sha256
          sha256sum --check --strict /tmp/images.sha256
          grep -q 'Mélanie' index.html
          node --check app.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v4
