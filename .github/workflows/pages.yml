name: Publish birthday site

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/pages.yml"
      - "payload/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rebuild site with original-resolution photographs
        shell: bash
        run: |
          set -euo pipefail

          cat payload/part00 payload/part01 payload/part02 payload/part03 payload/part04 payload/part05 \
            | tr -d '\r\n\t ' \
            | base64 --decode > /tmp/site.tar.gz
          gzip -t /tmp/site.tar.gz

          mkdir -p _site
          tar -xzf /tmp/site.tar.gz -C _site
          test -f _site/index.html
          test -f _site/styles.css
          test -f _site/app.js

          python3 - <<'PY'
          from pathlib import Path

          root = Path('_site')
          index = root / 'index.html'
          styles = root / 'styles.css'
          app = root / 'app.js'

          html = index.read_text(encoding='utf-8')
          for incorrect in ('Melanie', 'Melanié'):
              html = html.replace(incorrect, 'Mélanie')

          replacements = {
              'assets/mirror-home.png': 'assets/mirror-home.jpg?v=20260722-original-v2',
              'assets/mirror-away.png': 'assets/mirror-away.jpg?v=20260722-original-v2',
              'assets/kit-home.png': 'assets/kit-home.jpg?v=20260722-original-v2',
              'assets/kit-away.png': 'assets/kit-away.jpg?v=20260722-original-v2',
              'assets/mirror-home-full.webp?v=20260722-full': 'assets/mirror-home.jpg?v=20260722-original-v2',
              'assets/mirror-away-full.webp?v=20260722-full': 'assets/mirror-away.jpg?v=20260722-original-v2',
              'assets/kit-home-full.webp?v=20260722-full': 'assets/kit-home.jpg?v=20260722-original-v2',
              'assets/kit-away-full.webp?v=20260722-full': 'assets/kit-away.jpg?v=20260722-original-v2',
              'assets/champions-badge-full.webp?v=20260722-full': 'assets/champions-badge.jpg?v=20260722-original-v2',
          }
          for old, new in replacements.items():
              html = html.replace(old, new)
          html = html.replace('type="image/webp"', 'type="image/jpeg"')
          index.write_text(html, encoding='utf-8')

          css = styles.read_text(encoding='utf-8')
          for old in (
              "assets/mirror-home.png",
              "assets/mirror-home-full.webp?v=20260722-full",
              "assets/mirror-home-full.webp?v=20260722-full-final",
          ):
              css = css.replace(old, "assets/mirror-home.jpg?v=20260722-original-v2")
          css += "\nimg,.hero-image{image-rendering:auto;-ms-interpolation-mode:bicubic}\n"
          styles.write_text(css, encoding='utf-8')

          source = app.read_text(encoding='utf-8')
          old = "loadAssets();\nconst $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>[...r.querySelectorAll(s)];"
          new = "const $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>[...r.querySelectorAll(s)];\nloadAssets();"
          if old in source:
              source = source.replace(old, new, 1)
              app.write_text(source, encoding='utf-8')

          required = {
              'assets/mirror-home.jpg': 406023,
              'assets/mirror-away.jpg': 446022,
              'assets/kit-home.jpg': 354461,
              'assets/kit-away.jpg': 355122,
              'assets/champions-badge.jpg': 883741,
          }
          for relative, expected_size in required.items():
              path = root / relative
              if not path.exists():
                  raise SystemExit(f'Missing original image: {relative}')
              actual = path.stat().st_size
              if actual != expected_size:
                  raise SystemExit(f'Unexpected size for {relative}: {actual}; expected {expected_size}')
          PY

          node --check _site/app.js
          grep -q 'Mélanie' _site/index.html
          grep -q 'mirror-home.jpg?v=20260722-original-v2' _site/styles.css
          grep -q 'mirror-home.jpg?v=20260722-original-v2' _site/index.html
          if grep -q 'mirror-home.png' _site/styles.css; then
            echo 'Obsolete low-quality hero reference remains'
            exit 1
          fi
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
