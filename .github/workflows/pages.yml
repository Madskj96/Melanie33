name: Publish birthday site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rebuild and update website
        shell: bash
        run: |
          set -euo pipefail
          cat payload/part00 payload/part01 payload/part02 payload/part03 payload/part04 payload/part05 \
            | tr -d '\r\n\t ' \
            | base64 --decode > /tmp/site.tar.gz
          gzip -t /tmp/site.tar.gz
          mkdir -p _site
          tar -xzf /tmp/site.tar.gz -C _site
          test -f _site/index.html

          python3 - <<'PY'
          from pathlib import Path
          from PIL import Image

          app = Path('_site/app.js')
          source = app.read_text(encoding='utf-8')
          old = "loadAssets();\nconst $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>[...r.querySelectorAll(s)];"
          new = "const $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>[...r.querySelectorAll(s)];\nloadAssets();"
          if old in source:
              app.write_text(source.replace(old, new, 1), encoding='utf-8')
          elif not source.startswith('const $='):
              raise SystemExit('Unexpected app.js initialization order')

          index = Path('_site/index.html')
          html = index.read_text(encoding='utf-8')
          for incorrect in ('Melanie', 'Melanié'):
              html = html.replace(incorrect, 'Mélanie')
          html = html.replace(
              '<div class="hero-topline"><span>★</span><b>Fødselsdagsgave · 2026/27</b></div>',
              '<div class="hero-topline"><span>★</span><b>Fødselsdagsgave · 2026</b></div>'
          )
          html = html.replace(
              '<div class="hero-number" aria-hidden="true">26/27</div>',
              '<div class="hero-number" aria-hidden="true">2026</div>'
          )
          html = html.replace(
              "Du kan også få DBU's officielle Danmarksmester-badge sammen med Superliga-mærket. En lille detalje med meget stor betydning.",
              "Du kan også få DBU's officielle Danmarksmester-badge på trøjen. En lille detalje med meget stor betydning."
          )
          html = html.replace('DM-badge + Superliga-mærke', 'Kun Danmarksmester-badge')
          index.write_text(html, encoding='utf-8')

          not_found = Path('_site/404.html')
          if not_found.exists():
              text = not_found.read_text(encoding='utf-8')
              for incorrect in ('Melanie', 'Melanié'):
                  text = text.replace(incorrect, 'Mélanie')
              not_found.write_text(text, encoding='utf-8')

          # Ensure the deployment contains the supplied full-resolution images,
          # rather than the earlier reduced Base64 preview assets.
          expected = {
              'assets/mirror-home.png': (1093, 1438),
              'assets/mirror-away.png': (1094, 1438),
              'assets/kit-home.png': (1086, 1448),
              'assets/kit-away.png': (1086, 1448),
              'assets/champions-badge.jpg': (1125, 1393),
          }
          for relative, dimensions in expected.items():
              path = Path('_site') / relative
              if not path.exists():
                  raise SystemExit(f'Missing original image: {relative}')
              with Image.open(path) as image:
                  if image.size != dimensions:
                      raise SystemExit(
                          f'Wrong image dimensions for {relative}: '
                          f'{image.size}, expected {dimensions}'
                      )
          PY

          node --check _site/app.js
          grep -q 'Mélanie' _site/index.html
          if grep -q 'Melanié' _site/index.html; then
            echo 'Incorrect spelling is still present'
            exit 1
          fi
          grep -q 'Fødselsdagsgave · 2026<' _site/index.html
          if grep -q 'Superliga-mærke' _site/index.html; then
            echo 'Old Superliga text is still present'
            exit 1
          fi
          touch _site/.nojekyll
          echo "Prepared $(find _site -type f | wc -l) website files"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v4
