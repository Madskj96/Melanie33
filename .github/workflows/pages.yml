name: Inspect full-resolution package

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inspect uploaded package parts
        shell: bash
        run: |
          set -u
          mkdir -p diagnostics
          {
            echo "Generated $(date -u +%FT%TZ)"
            echo
            echo "Files:"
            for file in payload-fullres/part*; do
              wc -c "$file"
              sha256sum "$file"
            done
            echo
            echo "Combination tests:"
            for last in 05 06 07; do
              output="/tmp/site-${last}.tar.gz"
              files=()
              for number in $(seq -w 0 $((10#$last))); do
                files+=("payload-fullres/part${number}")
              done
              if cat "${files[@]}" | tr -d '\r\n\t ' | base64 --decode > "$output" 2>/tmp/decode-error && gzip -t "$output" 2>/tmp/gzip-error; then
                echo "part00..part${last}: VALID $(wc -c < "$output") bytes $(sha256sum "$output" | cut -d' ' -f1)"
                tar -tzf "$output" | sed 's/^/  /' | head -30
              else
                echo "part00..part${last}: INVALID"
                sed 's/^/  decode: /' /tmp/decode-error 2>/dev/null || true
                sed 's/^/  gzip: /' /tmp/gzip-error 2>/dev/null || true
              fi
            done
          } > diagnostics/fullres.txt

      - name: Save diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/fullres.txt
          git commit -m "Record full-resolution package diagnostics" || exit 0
          git push
