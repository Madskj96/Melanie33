name: Publish birthday site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rebuild website package
        shell: bash
        run: |
          set -euo pipefail
          cat payload/part00 payload/part01 payload/part02 payload/part03 payload/part04 payload/part05 \
            | tr -d '\r\n\t ' \
            | base64 --decode > /tmp/site.tar.gz
          gzip -t /tmp/site.tar.gz
          mkdir -p _site
          tar -xzf /tmp/site.tar.gz -C _site
          test -f _site/index.html

          python3 - <<'PY'
          from pathlib import Path
          path = Path('_site/app.js')
          source = path.read_text(encoding='utf-8')
          old = "loadAssets();\nconst $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>[...r.querySelectorAll(s)];"
          new = "const $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>[...r.querySelectorAll(s)];\nloadAssets();"
          if old in source:
              path.write_text(source.replace(old, new, 1), encoding='utf-8')
          elif not source.startswith('const $='):
              raise SystemExit('Unexpected app.js initialization order')
          PY

          node --check _site/app.js
          touch _site/.nojekyll
          echo "Prepared $(find _site -type f | wc -l) website files"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v4
