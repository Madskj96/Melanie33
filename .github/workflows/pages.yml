name: Publish birthday site

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/pages.yml"
      - "payload/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode website package
        run: |
          cat payload/part00 payload/part01 payload/part02 payload/part03 payload/part04 payload/part05 | tr -d '\r\n\t ' | base64 --decode > /tmp/site.tar.gz

      - name: Validate website package
        run: gzip -t /tmp/site.tar.gz

      - name: Extract website
        run: |
          mkdir -p _site
          tar -xzf /tmp/site.tar.gz -C _site
          test -f _site/index.html
          test -f _site/styles.css
          test -f _site/app.js

      - name: Apply final corrections
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          root = Path('_site')
          index = root / 'index.html'
          styles = root / 'styles.css'
          app = root / 'app.js'

          html = index.read_text(encoding='utf-8')
          for incorrect in ('Melanie', 'Melanié'):
              html = html.replace(incorrect, 'Mélanie')
          index.write_text(html, encoding='utf-8')

          css = styles.read_text(encoding='utf-8')
          css = css.replace("assets/mirror-home.png')", "assets/mirror-home.png?v=original-20260722')")
          css += "\nimg,.hero-image{image-rendering:auto;-ms-interpolation-mode:bicubic}\n"
          styles.write_text(css, encoding='utf-8')

          source = app.read_text(encoding='utf-8')
          old = "loadAssets();\nconst $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>[...r.querySelectorAll(s)];"
          new = "const $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>[...r.querySelectorAll(s)];\nloadAssets();"
          if old in source:
              app.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
